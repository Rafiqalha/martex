name: mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  google_generative_ai: ^0.4.7
  fl_chart: ^0.66.0
  flutter_markdown: ^0.6.18
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # PENTING: Paket pembuat ikon harus ada di sini
  flutter_launcher_icons: ^0.13.1 

# PENTING: Konfigurasi ikon harus di luar blok 'flutter:'
flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg"

flutter:
  uses-material-design: true

  fonts:
    - family: Duolingo
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
          weight: 700